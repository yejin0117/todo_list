<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar__inner">
    <span class="topbar__brand">
      <span class="topbar__brand-mark" aria-hidden="true">✓</span>
      To Do List
    </span>
    <button type="button" class="topbar__history-btn" id="historyOpenBtn" aria-label="완료한 일 기록 패널 열기">
      <span aria-hidden="true">🕘</span> 완료 기록
    </button>
  </div>
</header>

<section class="hero">
  <div class="hero__inner">
    <div class="hero__text">
      <h1 class="hero__title">오늘의 할일</h1>
      <div class="hero__stats">
        <span class="hero__stat hero__stat--todo">TODO 해야할일 <strong id="todoCount">0</strong></span>
        <span class="hero__stat hero__stat--done">DONE 완료한일 <strong id="doneCount">0</strong></span>
      </div>
    </div>

    <!-- FR1: 일정 추가 영역 -->
    <form class="add-bar" id="addForm">
      <button type="submit" class="add-bar__submit" aria-label="일정 추가">＋</button>
      <label class="sr-only" for="taskTitleInput">할 일 제목</label>
      <input type="text" id="taskTitleInput" class="add-bar__input" placeholder="Add a task..." autocomplete="off">
    </form>
  </div>
</section>

<main class="page">
  <!-- FR1으로 추가된 일정이 나열되는 목록. 클릭 이벤트는 상위 ul 하나에서 위임 처리한다 -->
  <ul class="page__list" id="taskList" aria-label="진행 중인 할일 목록"></ul>
  <p class="page__empty" id="emptyHint">할일을 추가해 보세요.</p>
</main>

<!-- 완료 기록 패널 (오른쪽에서 슬라이드) -->
<div class="history-overlay" id="historyOverlay">
  <div class="history-overlay__backdrop" id="historyBackdrop"></div>
  <aside class="history-overlay__panel" aria-label="완료한 일 기록">
    <div class="history-overlay__head">
      <h2 class="history-overlay__title">완료한 일 기록</h2>
      <button type="button" class="history-overlay__close" id="historyCloseBtn" aria-label="완료 기록 패널 닫기">×</button>
    </div>
    <!-- 복원/삭제 클릭도 상위 ul 하나에서 위임 처리한다 -->
    <ul class="history-overlay__list" id="historyList" aria-label="완료한 일 목록"></ul>
    <p class="history-overlay__empty" id="historyEmptyHint">아직 완료한 일이 없어요.</p>
  </aside>
</div>

<template id="taskCardTemplate">
  <li class="task-card">
    <button type="button" class="task-card__checkbox" data-action="complete" aria-label="완료로 표시"></button>
    <div class="task-card__body">
      <p class="task-card__title"></p>
    </div>
    <button type="button" class="task-card__delete" data-action="delete" aria-label="일정 삭제">🗑</button>
  </li>
</template>

<template id="historyCardTemplate">
  <li class="history-card">
    <button type="button" class="history-card__check" data-action="restore" aria-label="진행 목록으로 복원">✓</button>
    <div class="history-card__body">
      <p class="history-card__title"></p>
    </div>
    <button type="button" class="history-card__delete" data-action="delete" aria-label="기록 삭제">🗑</button>
  </li>
</template>

<script src="app.js"></script>
</body>
</html>
